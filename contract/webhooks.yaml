version: 1

events:
  - type: user.created
    stability: stable
    headers:
      - X-Authara-Event
      - X-Authara-Delivery
      - X-Authara-Signature
    payload:
      id: string
      type: user.created
      created_at: rfc3339
      data:
        user_id: uuid

  - type: user.deleted
    stability: stable
    headers:
      - X-Authara-Event
      - X-Authara-Delivery
      - X-Authara-Signature
    payload:
      id: string
      type: user.deleted
      created_at: rfc3339
      data:
        user_id: uuid

  - type: organization_invitation.created
    stability: stable
    headers:
      - X-Authara-Event
      - X-Authara-Delivery
      - X-Authara-Signature
    payload:
      id: string
      type: organization_invitation.created
      created_at: rfc3339
      data:
        invitation_id: uuid
        organization_id: uuid
        email: string
        role: string
        invited_by_user_id: uuid|null
        expires_at: rfc3339

  - type: organization_invitation.accepted
    stability: stable
    headers:
      - X-Authara-Event
      - X-Authara-Delivery
      - X-Authara-Signature
    payload:
      id: string
      type: organization_invitation.accepted
      created_at: rfc3339
      data:
        invitation_id: uuid
        organization_id: uuid
        email: string
        role: string
        accepted_by_user_id: uuid
        accepted_at: rfc3339

  - type: organization_membership.created
    stability: stable
    headers:
      - X-Authara-Event
      - X-Authara-Delivery
      - X-Authara-Signature
    payload:
      id: string
      type: organization_membership.created
      created_at: rfc3339
      data:
        organization_id: uuid
        user_id: uuid
        role: string

signature:
  header: X-Authara-Signature
  format: sha256=<hex>
  algorithm: hmac-sha256

delivery:
  method: POST
  content_type: application/json
  semantics: best_effort
  retries:
    on:
      - network_error
      - http_429
      - http_5xx
    not_on:
      - other_http_4xx
