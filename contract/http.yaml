version: 1

routes:
  # ------------------------------------------------------------
  # Meta
  # ------------------------------------------------------------
  - method: GET
    path: /auth/health
    stability: stable
    kind: meta
    access: public
    notes: Health endpoint.

  - method: GET
    path: /auth/version
    stability: stable
    kind: meta
    access: public
    notes: Version endpoint.

  # ------------------------------------------------------------
  # Auth UI
  # ------------------------------------------------------------
  - method: GET
    path: /auth/login
    stability: stable
    kind: html
    access: public
    notes: Login page.

  - method: GET
    path: /auth/signup
    stability: stable
    kind: html
    access: public
    notes: Signup page.

  - method: POST
    path: /auth/sessions/logout
    stability: stable
    kind: action
    access: public
    notes: Logout current session.

  - method: POST
    path: /auth/sessions/refresh
    stability: stable
    kind: action
    access: public
    notes: Refresh current session.

  # ------------------------------------------------------------
  # OAuth
  # ------------------------------------------------------------
  - method: POST
    path: /auth/oauth/google/callback
    stability: stable
    kind: browser-callback
    access: public
    notes: Google OAuth callback.

  # ------------------------------------------------------------
  # Authenticated user routes
  # ------------------------------------------------------------
  - method: GET
    path: /auth/account
    stability: stable
    kind: html
    access: user
    notes: Authenticated user account page.

  # ------------------------------------------------------------
  # JSON API v1
  # ------------------------------------------------------------
  - method: GET
    path: /auth/api/v1/user
    stability: stable
    kind: json
    access: user
    notes: Returns current authenticated user.

  - method: POST
    path: /auth/api/v1/sessions/refresh
    stability: stable
    kind: json
    access: public
    notes: Refreshes current authenticated session.

  - method: POST
    path: /auth/api/v1/sessions/logout
    stability: stable
    kind: json
    access: public
    notes: Logs out current session.

json_success_responses:
  - endpoint: GET /auth/api/v1/user
    stability: stable
    response:
      id: uuid
      username: string
      email: string
      disabled: bool
      created_at: string
      roles: array

  - endpoint: POST /auth/api/v1/sessions/refresh
    stability: stable
    response:
      status: 200
      body: none
      cookies_set:
        - authara_access
        - authara_refresh

  - endpoint: POST /auth/api/v1/sessions/logout
    stability: stable
    response:
      status: 204
      body: none
      cookies_cleared:
        - authara_access
        - authara_refresh

json_error_envelope:
  stability: stable
  shape:
    error:
      code: string
      message: string

json_error_contracts:
  - endpoint: GET /auth/api/v1/user
    stability: stable
    errors:
      - status: 401
        code: unauthorized

  - endpoint: POST /auth/api/v1/sessions/refresh
    stability: stable
    errors:
      - status: 401
        code: unauthorized
      - status: 400
        code: invalid_request
      - status: 500
        code: internal_error

  - endpoint: POST /auth/api/v1/sessions/logout
    stability: stable
    errors: []

csrf_contract:
  stability: stable

  applies_to:
    rule: every stable POST route under /auth requires CSRF
    exceptions:
      - /auth/oauth/google/callback

  browser_error:
    status: 403
    response_kind: text

  api_error:
    status: 403
    response_kind: json
    error:
      code: forbidden

cookies:
  - name: authara_access
    stability: stable
    purpose: Access token cookie.

  - name: authara_refresh
    stability: stable
    purpose: Refresh token cookie.

  - name: authara_csrf
    stability: stable
    purpose: CSRF protection cookie.

headers:
  - name: HX-Redirect
    stability: stable
    purpose: HTMX redirect behavior.

query_parameters:
  - name: return_to
    stability: stable
    applies_to:
      - /auth/login
      - /auth/signup
    semantics:
      - must be a relative path starting with /
      - values starting with // are rejected
      - invalid values are ignored
      - used as post-auth redirect target

behavior:
  redirects:
    - name: unauthenticated_protected_page_redirect
      stability: stable
      notes: Protected browser routes redirect unauthenticated users to login.

    - name: authenticated_login_signup_redirect
      stability: stable
      notes: Already-authenticated users are redirected away from login/signup pages.

    - name: htmx_redirect_header_behavior
      stability: stable
      notes: HTMX flows may use HX-Redirect.

    - name: return_to_redirect_parameter
      stability: stable
      notes: return_to is honored for valid internal relative paths and ignored for invalid values.

  csrf:
    - name: csrf_required_for_state_changing_routes
      stability: stable
      notes: Every stable POST route under /auth requires CSRF unless explicitly excluded.

    - name: csrf_failure_on_api_routes
      stability: stable
      notes: CSRF failure on /auth/api/v1 POST routes returns 403 with JSON error envelope.

    - name: csrf_failure_on_browser_routes
      stability: stable
      notes: CSRF failure on non-API /auth POST routes returns 403 text response.

  sessions:
    - name: access_and_refresh_token_model
      stability: stable
      notes: Authara uses access-token plus refresh-token session semantics.

    - name: refresh_token_reuse_detection
      stability: stable
      notes: Reuse of consumed refresh token is treated as a security event.

compatibility_rules:
  patch:
    breaking_changes_allowed: false
    additive_changes_allowed: false

  minor:
    breaking_changes_allowed: false
    additive_changes_allowed: true

  major:
    breaking_changes_allowed: true
    additive_changes_allowed: true
