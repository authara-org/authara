version: 1

routes:
  # ------------------------------------------------------------
  # Meta
  # ------------------------------------------------------------
  - method: GET
    path: /auth/health
    stability: stable
    kind: meta
    access: public
    notes: Health endpoint.

  - method: GET
    path: /auth/version
    stability: stable
    kind: meta
    access: public
    notes: Version endpoint.

  # ------------------------------------------------------------
  # Auth UI
  # ------------------------------------------------------------
  - method: GET
    path: /auth/login
    stability: stable
    kind: html
    access: public
    notes: Login page.

  - method: GET
    path: /auth/signup
    stability: stable
    kind: html
    access: public
    notes: Signup page.

  - method: POST
    path: /auth/sessions/logout
    stability: stable
    kind: action
    access: public
    notes: Logout current session.

  - method: POST
    path: /auth/sessions/refresh
    stability: stable
    kind: action
    access: public
    notes: Refresh current session.

  - method: GET
    path: /auth/invitations/accept
    stability: stable
    kind: html
    access: public
    notes: Authara-hosted organization invitation accept page.

  # ------------------------------------------------------------
  # OAuth
  # ------------------------------------------------------------
  - method: POST
    path: /auth/oauth/google/callback
    stability: stable
    kind: browser-callback
    access: public
    notes: Google OAuth callback.

  # ------------------------------------------------------------
  # Authenticated user routes
  # ------------------------------------------------------------
  - method: GET
    path: /auth/account
    stability: stable
    kind: html
    access: user
    notes: Authenticated user account page.

  - method: POST
    path: /auth/invitations/accept
    stability: stable
    kind: action
    access: user
    notes: Accepts an organization invitation for the authenticated user.

  # ------------------------------------------------------------
  # JSON API v1
  # ------------------------------------------------------------
  - method: GET
    path: /auth/api/v1/csrf
    stability: stable
    kind: json
    access: public
    notes: Returns a CSRF token and sets authara_csrf.

  - method: POST
    path: /auth/api/v1/login
    stability: stable
    kind: json
    access: public
    notes: Logs in with email and password.

  - method: POST
    path: /auth/api/v1/signup
    stability: stable
    kind: json
    access: public
    notes: Creates an account with email and password.

  - method: GET
    path: /auth/api/v1/user
    stability: stable
    kind: json
    access: user
    notes: Returns current authenticated user.

  - method: GET
    path: /auth/api/v1/organizations
    stability: stable
    kind: json
    access: user
    notes: Returns organizations the current user belongs to.

  - method: GET
    path: /auth/api/v1/organizations/current
    stability: stable
    kind: json
    access: user
    notes: Returns the organization from the current access token.

  - method: POST
    path: /auth/api/v1/organizations/{organizationID}/switch
    stability: stable
    kind: json
    access: user
    notes: Switches the current session to another organization and rotates tokens.

  - method: POST
    path: /auth/api/v1/sessions/refresh
    stability: stable
    kind: json
    access: public
    notes: Refreshes current browser cookie session.

  - method: POST
    path: /auth/api/v1/tokens/refresh
    stability: stable
    kind: json
    access: public
    notes: Refreshes a token session from a JSON refresh token.

  - method: POST
    path: /auth/api/v1/sessions/logout
    stability: stable
    kind: json
    access: public
    notes: Logs out current session.

  # ------------------------------------------------------------
  # Internal API v1
  # ------------------------------------------------------------
  - method: GET
    path: /auth/internal/v1/capabilities
    stability: stable
    kind: json
    access: internal
    notes: Returns organization-mode capabilities for internal integrations.

  - method: POST
    path: /auth/internal/v1/organizations
    stability: stable
    kind: json
    access: internal
    notes: Creates a team organization with an owner membership.

  - method: GET
    path: /auth/internal/v1/organizations/{organizationID}
    stability: stable
    kind: json
    access: internal
    notes: Returns an organization.

  - method: PATCH
    path: /auth/internal/v1/organizations/{organizationID}
    stability: stable
    kind: json
    access: internal
    notes: Updates an organization.

  - method: GET
    path: /auth/internal/v1/organizations/{organizationID}/members
    stability: stable
    kind: json
    access: internal
    notes: Lists organization members.

  - method: GET
    path: /auth/internal/v1/organizations/{organizationID}/members/{userID}
    stability: stable
    kind: json
    access: internal
    notes: Returns one organization member.

  - method: GET
    path: /auth/internal/v1/organizations/{organizationID}/invitations
    stability: stable
    kind: json
    access: internal
    notes: Lists organization invitations.

  - method: POST
    path: /auth/internal/v1/organizations/{organizationID}/invitations
    stability: stable
    kind: json
    access: internal
    notes: Creates a member organization invitation. Requires AUTHARA_INTERNAL_API_TOKEN bearer auth, requires actor_user_id, and does not use CSRF.

  - method: GET
    path: /auth/internal/v1/organizations/{organizationID}/invitations/{invitationID}
    stability: stable
    kind: json
    access: internal
    notes: Returns an organization invitation.

  - method: POST
    path: /auth/internal/v1/organizations/{organizationID}/invitations/{invitationID}/revoke
    stability: stable
    kind: json
    access: internal
    notes: Revokes a pending organization invitation.

  - method: GET
    path: /auth/internal/v1/users/{userID}/memberships
    stability: stable
    kind: json
    access: internal
    notes: Lists organization memberships for a user.

json_success_responses:
  - endpoint: GET /auth/api/v1/csrf
    stability: stable
    response:
      csrf_token: string
      cookies_set:
        - authara_csrf

  - endpoint: POST /auth/api/v1/login
    stability: stable
    response:
      status: 200
      body:
        user: object
        access_token: string
        refresh_token: string
      cookies_set:
        - authara_access
        - authara_refresh

  - endpoint: POST /auth/api/v1/signup
    stability: stable
    response:
      status: 201
      body:
        user: object
        access_token: string
        refresh_token: string
      cookies_set:
        - authara_access
        - authara_refresh

  - endpoint: GET /auth/api/v1/user
    stability: stable
    response:
      id: uuid
      username: string
      email: string
      disabled: bool
      created_at: string
      roles: array
      organization:
        id: uuid
        name: string
        role: string

  - endpoint: GET /auth/api/v1/organizations
    stability: stable
    response:
      organizations:
        - id: uuid
          name: string
          role: string

  - endpoint: GET /auth/api/v1/organizations/current
    stability: stable
    response:
      id: uuid
      name: string
      role: string

  - endpoint: POST /auth/api/v1/organizations/{organizationID}/switch
    stability: stable
    response:
      status: 200
      body:
        access_token: string
        refresh_token: string
      cookies_set:
        - authara_access
        - authara_refresh

  - endpoint: POST /auth/api/v1/sessions/refresh
    stability: stable
    response:
      status: 200
      body: none
      cookies_set:
        - authara_access
        - authara_refresh

  - endpoint: POST /auth/api/v1/tokens/refresh
    stability: stable
    response:
      status: 200
      body:
        access_token: string
        refresh_token: string

  - endpoint: POST /auth/api/v1/sessions/logout
    stability: stable
    response:
      status: 204
      body: none
      cookies_cleared:
        - authara_access
        - authara_refresh

  - endpoint: GET /auth/internal/v1/capabilities
    stability: stable
    response:
      organization_mode: string
      has_visible_organizations: bool
      allows_invitations: bool
      allows_org_switching: bool
      allows_user_created_team_orgs: bool
      allows_organization_leave: bool

  - endpoint: POST /auth/internal/v1/organizations
    stability: stable
    response:
      status: 201
      body:
        organization: object
        membership: object

  - endpoint: GET /auth/internal/v1/organizations/{organizationID}
    stability: stable
    response:
      organization: object

  - endpoint: PATCH /auth/internal/v1/organizations/{organizationID}
    stability: stable
    response:
      organization: object

  - endpoint: GET /auth/internal/v1/organizations/{organizationID}/members
    stability: stable
    response:
      members: array

  - endpoint: GET /auth/internal/v1/organizations/{organizationID}/members/{userID}
    stability: stable
    response:
      member: object

  - endpoint: GET /auth/internal/v1/organizations/{organizationID}/invitations
    stability: stable
    response:
      invitations: array

  - endpoint: POST /auth/internal/v1/organizations/{organizationID}/invitations
    stability: stable
    response:
      status: 201
      body:
        invitation:
          id: uuid
          organization_id: uuid
          email: string
          role: string
          status: string
          expires_at: rfc3339
          invite_url: string

  - endpoint: GET /auth/internal/v1/organizations/{organizationID}/invitations/{invitationID}
    stability: stable
    response:
      invitation: object

  - endpoint: POST /auth/internal/v1/organizations/{organizationID}/invitations/{invitationID}/revoke
    stability: stable
    response:
      invitation: object

  - endpoint: GET /auth/internal/v1/users/{userID}/memberships
    stability: stable
    response:
      memberships: array

json_error_envelope:
  stability: stable
  shape:
    error:
      code: string
      message: string

json_error_contracts:
  - endpoint: GET /auth/api/v1/csrf
    stability: stable
    errors:
      - status: 500
        code: internal_error

  - endpoint: POST /auth/api/v1/login
    stability: stable
    errors:
      - status: 400
        code: invalid_request
      - status: 401
        code: unauthorized
      - status: 403
        code: forbidden
      - status: 429
        code: rate_limited
      - status: 500
        code: internal_error

  - endpoint: POST /auth/api/v1/signup
    stability: stable
    errors:
      - status: 400
        code: invalid_request
      - status: 403
        code: forbidden
      - status: 429
        code: rate_limited
      - status: 500
        code: internal_error

  - endpoint: GET /auth/api/v1/user
    stability: stable
    errors:
      - status: 401
        code: unauthorized

  - endpoint: GET /auth/api/v1/organizations
    stability: stable
    errors:
      - status: 401
        code: unauthorized
      - status: 500
        code: internal_error

  - endpoint: GET /auth/api/v1/organizations/current
    stability: stable
    errors:
      - status: 401
        code: unauthorized
      - status: 500
        code: internal_error

  - endpoint: POST /auth/api/v1/organizations/{organizationID}/switch
    stability: stable
    errors:
      - status: 401
        code: unauthorized
      - status: 400
        code: invalid_request
      - status: 403
        code: forbidden
      - status: 500
        code: internal_error

  - endpoint: POST /auth/api/v1/sessions/refresh
    stability: stable
    errors:
      - status: 401
        code: unauthorized
      - status: 400
        code: invalid_request
      - status: 500
        code: internal_error

  - endpoint: POST /auth/api/v1/tokens/refresh
    stability: stable
    errors:
      - status: 401
        code: unauthorized
      - status: 400
        code: invalid_request
      - status: 500
        code: internal_error

  - endpoint: POST /auth/api/v1/sessions/logout
    stability: stable
    errors: []

  - endpoint: GET /auth/internal/v1/capabilities
    stability: stable
    errors:
      - status: 401
        code: unauthorized

  - endpoint: POST /auth/internal/v1/organizations
    stability: stable
    errors:
      - status: 401
        code: unauthorized
      - status: 400
        code: invalid_request
      - status: 403
        code: forbidden
      - status: 404
        code: user_not_found
      - status: 500
        code: internal_error

  - endpoint: GET /auth/internal/v1/organizations/{organizationID}
    stability: stable
    errors:
      - status: 401
        code: unauthorized
      - status: 400
        code: invalid_request
      - status: 404
        code: organization_not_found
      - status: 500
        code: internal_error

  - endpoint: PATCH /auth/internal/v1/organizations/{organizationID}
    stability: stable
    errors:
      - status: 401
        code: unauthorized
      - status: 400
        code: invalid_request
      - status: 404
        code: organization_not_found
      - status: 500
        code: internal_error

  - endpoint: GET /auth/internal/v1/organizations/{organizationID}/members
    stability: stable
    errors:
      - status: 401
        code: unauthorized
      - status: 400
        code: invalid_request
      - status: 404
        code: organization_not_found
      - status: 500
        code: internal_error

  - endpoint: GET /auth/internal/v1/organizations/{organizationID}/members/{userID}
    stability: stable
    errors:
      - status: 401
        code: unauthorized
      - status: 400
        code: invalid_request
      - status: 404
        code: organization_not_found
      - status: 404
        code: membership_not_found
      - status: 500
        code: internal_error

  - endpoint: GET /auth/internal/v1/organizations/{organizationID}/invitations
    stability: stable
    errors:
      - status: 401
        code: unauthorized
      - status: 400
        code: invalid_request
      - status: 403
        code: forbidden
      - status: 404
        code: organization_not_found
      - status: 500
        code: internal_error

  - endpoint: POST /auth/internal/v1/organizations/{organizationID}/invitations
    stability: stable
    errors:
      - status: 401
        code: unauthorized
      - status: 403
        code: actor_not_member
      - status: 403
        code: actor_not_allowed
      - status: 404
        code: organization_not_found
      - status: 409
        code: already_member
      - status: 409
        code: invitation_already_pending
      - status: 400
        code: invalid_request
      - status: 500
        code: internal_error

  - endpoint: GET /auth/internal/v1/organizations/{organizationID}/invitations/{invitationID}
    stability: stable
    errors:
      - status: 401
        code: unauthorized
      - status: 400
        code: invalid_request
      - status: 403
        code: forbidden
      - status: 404
        code: invitation_not_found
      - status: 500
        code: internal_error

  - endpoint: POST /auth/internal/v1/organizations/{organizationID}/invitations/{invitationID}/revoke
    stability: stable
    errors:
      - status: 401
        code: unauthorized
      - status: 400
        code: invalid_request
      - status: 403
        code: forbidden
      - status: 404
        code: organization_not_found
      - status: 404
        code: invitation_not_found
      - status: 404
        code: user_not_found
      - status: 409
        code: invitation_already_accepted
      - status: 409
        code: invitation_revoked
      - status: 409
        code: invitation_expired
      - status: 500
        code: internal_error

  - endpoint: GET /auth/internal/v1/users/{userID}/memberships
    stability: stable
    errors:
      - status: 401
        code: unauthorized
      - status: 400
        code: invalid_request
      - status: 404
        code: user_not_found
      - status: 500
        code: internal_error

csrf_contract:
  stability: stable

  applies_to:
    rule: every stable POST route under /auth requires CSRF
    exceptions:
      - /auth/api/v1/tokens/refresh
      - /auth/internal/v1/organizations
      - /auth/internal/v1/organizations/{organizationID}/invitations
      - /auth/internal/v1/organizations/{organizationID}/invitations/{invitationID}/revoke

  browser_error:
    status: 403
    response_kind: html

  api_error:
    status: 403
    response_kind: json
    error:
      code: forbidden

cookies:
  - name: authara_access
    stability: stable
    purpose: Access token cookie.

  - name: authara_refresh
    stability: stable
    purpose: Refresh token cookie.

  - name: authara_csrf
    stability: stable
    purpose: CSRF protection cookie.

  - name: authara_oauth_nonce
    stability: stable
    purpose: Google OAuth nonce binding cookie.

headers:
  - name: HX-Redirect
    stability: stable
    purpose: HTMX redirect behavior.

  - name: Content-Security-Policy
    stability: stable
    purpose: Restricts browser-executable content and external resource origins on Authara routes.

  - name: X-Frame-Options
    stability: stable
    purpose: Prevents Authara pages from being embedded in frames.

  - name: X-Content-Type-Options
    stability: stable
    purpose: Prevents browser MIME sniffing.

  - name: Referrer-Policy
    stability: stable
    purpose: Limits referrer leakage from Authara routes.

query_parameters:
  - name: return_to
    stability: stable
    applies_to:
      - /auth/login
      - /auth/signup
      - /auth/account
    semantics:
      - must be a relative path starting with /
      - values starting with // are rejected
      - invalid values are ignored
      - used as post-auth redirect target

behavior:
  redirects:
    - name: unauthenticated_protected_page_redirect
      stability: stable
      notes: Protected browser routes redirect unauthenticated users to login.

    - name: authenticated_login_signup_redirect
      stability: stable
      notes: Already-authenticated users are redirected away from login/signup pages.

    - name: htmx_redirect_header_behavior
      stability: stable
      notes: HTMX flows may use HX-Redirect.

    - name: return_to_redirect_parameter
      stability: stable
      notes: return_to is honored for valid internal relative paths and ignored for invalid values.

  csrf:
    - name: csrf_required_for_state_changing_routes
      stability: stable
      notes: Every stable POST route under /auth requires CSRF unless explicitly excluded.

    - name: csrf_failure_on_api_routes
      stability: stable
      notes: CSRF failure on /auth/api/v1 POST routes returns 403 with JSON error envelope.

    - name: csrf_failure_on_browser_routes
      stability: stable
      notes: CSRF failure on non-API /auth POST routes returns 403 text response.

  sessions:
    - name: access_and_refresh_token_model
      stability: stable
      notes: Authara uses access-token plus refresh-token session semantics.

    - name: refresh_token_reuse_detection
      stability: stable
      notes: Reuse of consumed refresh token is treated as a security event.

compatibility_rules:
  patch:
    breaking_changes_allowed: false
    additive_changes_allowed: false

  minor:
    breaking_changes_allowed: false
    additive_changes_allowed: true

  major:
    breaking_changes_allowed: true
    additive_changes_allowed: true
