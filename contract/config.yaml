version: 1

variables:

  # ------------------------------------------------------------
  # App / Runtime
  # ------------------------------------------------------------

  - name: APP_ENV
    stability: stable
    required: false
    type: enum
    default: dev
    allowed_values: [dev, prod]

  - name: LOG_LEVEL
    stability: stable
    required: false
    type: string
    default:
      dev: debug
      prod: info

  # ------------------------------------------------------------
  # Database
  # ------------------------------------------------------------

  - name: POSTGRESQL_HOST
    stability: stable
    required: true
    type: string

  - name: POSTGRESQL_PORT
    stability: stable
    required: true
    type: int

  - name: POSTGRESQL_DATABASE
    stability: stable
    required: true
    type: string

  - name: POSTGRESQL_USERNAME
    stability: stable
    required: true
    type: string

  - name: POSTGRESQL_PASSWORD
    stability: stable
    required: true
    type: string

  - name: POSTGRESQL_SCHEMA
    stability: stable
    required: false
    type: string
    default: authara

  - name: POSTGRESQL_TIMEZONE
    stability: stable
    required: false
    type: string
    default: UTC

  - name: POSTGRESQL_LOG_SQL
    stability: stable
    required: false
    type: bool
    default: false

  - name: AUTHARA_DB_MAX_OPEN_CONNS
    stability: stable
    required: false
    type: int
    default: 40

  - name: AUTHARA_DB_MAX_IDLE_CONNS
    stability: stable
    required: false
    type: int
    default: 20

  - name: AUTHARA_DB_CONN_MAX_LIFETIME
    stability: stable
    required: false
    type: duration
    default: 30m

  - name: AUTHARA_DB_CONN_MAX_IDLE_TIME
    stability: stable
    required: false
    type: duration
    default: 5m

  # ------------------------------------------------------------
  # Public URL
  # ------------------------------------------------------------

  - name: PUBLIC_URL
    stability: stable
    required: true
    type: url
    notes: Must not include /auth

  - name: AUTHARA_TRUST_PROXY_HEADERS
    stability: stable
    required: false
    type: bool
    default: false
    notes: Enables trusted X-Forwarded-For/X-Real-IP parsing when Authara is behind a proxy that strips client-supplied forwarded headers.

  # ------------------------------------------------------------
  # JWT / Tokens
  # ------------------------------------------------------------

  - name: AUTHARA_JWT_ISSUER
    stability: stable
    required: true
    type: string

  - name: AUTHARA_JWT_ACTIVE_KEY_ID
    stability: stable
    required: true
    type: string

  - name: AUTHARA_JWT_KEYS
    stability: stable
    required: true
    type: map[string]base64
    format: "keyID:base64secret,keyID2:base64secret2"

  - name: AUTHARA_ACCESS_TOKEN_TTL_MINUTES
    stability: stable
    required: false
    type: int
    default: 10

  - name: AUTHARA_SESSION_TTL_DAYS
    stability: stable
    required: false
    type: int
    default: 60

  - name: AUTHARA_REFRESH_TOKEN_TTL_DAYS
    stability: stable
    required: false
    type: int
    default: 14

  - name: AUTHARA_REFRESH_TOKEN_ROTATION_INTERVAL
    stability: stable
    required: false
    type: string
    default: 24h
    allowed_values:
      - disabled
      - off
      - always
      - duration

  # ------------------------------------------------------------
  # OAuth
  # ------------------------------------------------------------

  - name: AUTHARA_OAUTH_PROVIDERS
    stability: stable
    required: false
    type: csv
    allowed_values:
      - google

  - name: AUTHARA_OAUTH_GOOGLE_CLIENT_ID
    stability: stable
    required: false
    type: string
    required_if:
      variable: AUTHARA_OAUTH_PROVIDERS
      contains: google

  # ------------------------------------------------------------
  # Rate Limiting (Login)
  # ------------------------------------------------------------

  - name: AUTHARA_RATE_LIMIT_LOGIN_IP_LIMIT
    stability: stable
    required: false
    type: int
    default: 5

  - name: AUTHARA_RATE_LIMIT_LOGIN_IP_WINDOW
    stability: stable
    required: false
    type: duration
    default: 1m

  - name: AUTHARA_RATE_LIMIT_LOGIN_EMAIL_LIMIT
    stability: stable
    required: false
    type: int
    default: 10

  - name: AUTHARA_RATE_LIMIT_LOGIN_EMAIL_WINDOW
    stability: stable
    required: false
    type: duration
    default: 1h

  # ------------------------------------------------------------
  # Rate Limiting (Signup)
  # ------------------------------------------------------------

  - name: AUTHARA_RATE_LIMIT_SIGNUP_IP_LIMIT
    stability: stable
    required: false
    type: int
    default: 3

  - name: AUTHARA_RATE_LIMIT_SIGNUP_IP_WINDOW
    stability: stable
    required: false
    type: duration
    default: 1h

  - name: AUTHARA_RATE_LIMIT_SIGNUP_EMAIL_LIMIT
    stability: stable
    required: false
    type: int
    default: 3

  - name: AUTHARA_RATE_LIMIT_SIGNUP_EMAIL_WINDOW
    stability: stable
    required: false
    type: duration
    default: 24h

  # ------------------------------------------------------------
  # Rate Limiting (Password Reset)
  # ------------------------------------------------------------

  - name: AUTHARA_RATE_LIMIT_PASSWORD_RESET_IP_LIMIT
    stability: stable
    required: false
    type: int
    default: 5

  - name: AUTHARA_RATE_LIMIT_PASSWORD_RESET_IP_WINDOW
    stability: stable
    required: false
    type: duration
    default: 1h

  - name: AUTHARA_RATE_LIMIT_PASSWORD_RESET_EMAIL_LIMIT
    stability: stable
    required: false
    type: int
    default: 3

  - name: AUTHARA_RATE_LIMIT_PASSWORD_RESET_EMAIL_WINDOW
    stability: stable
    required: false
    type: duration
    default: 24h

  # ------------------------------------------------------------
  # Rate Limiting (Challenge Verify)
  # ------------------------------------------------------------

  - name: AUTHARA_RATE_LIMIT_CHALLENGE_VERIFY_IP_LIMIT
    stability: stable
    required: false
    type: int
    default: 30

  - name: AUTHARA_RATE_LIMIT_CHALLENGE_VERIFY_IP_WINDOW
    stability: stable
    required: false
    type: duration
    default: 10m

  - name: AUTHARA_RATE_LIMIT_CHALLENGE_VERIFY_ID_LIMIT
    stability: stable
    required: false
    type: int
    default: 10

  - name: AUTHARA_RATE_LIMIT_CHALLENGE_VERIFY_ID_WINDOW
    stability: stable
    required: false
    type: duration
    default: 30m

  # ------------------------------------------------------------
  # Rate Limiting (Challenge Resend)
  # ------------------------------------------------------------

  - name: AUTHARA_RATE_LIMIT_CHALLENGE_RESEND_IP_LIMIT
    stability: stable
    required: false
    type: int
    default: 10

  - name: AUTHARA_RATE_LIMIT_CHALLENGE_RESEND_IP_WINDOW
    stability: stable
    required: false
    type: duration
    default: 1h

  - name: AUTHARA_RATE_LIMIT_CHALLENGE_RESEND_ID_LIMIT
    stability: stable
    required: false
    type: int
    default: 5

  - name: AUTHARA_RATE_LIMIT_CHALLENGE_RESEND_ID_WINDOW
    stability: stable
    required: false
    type: duration
    default: 30m

  # ------------------------------------------------------------
  # Limiter Safety
  # ------------------------------------------------------------

  - name: AUTHARA_RATE_LIMIT_CLEANUP_EVERY
    stability: stable
    required: false
    type: int
    default: 200

  - name: AUTHARA_RATE_LIMIT_MAX_ENTRIES
    stability: stable
    required: false
    type: int
    default: 50000

  # ------------------------------------------------------------
  # Webhook Events
  # ------------------------------------------------------------

  - name: AUTHARA_WEBHOOK_URL
    stability: stable
    required: false
    type: url

  - name: AUTHARA_WEBHOOK_SECRET
    stability: stable
    required: false
    type: string

  - name: AUTHARA_WEBHOOK_ENABLED_EVENTS
    stability: stable
    required: false
    type: csv
    allowed_values:
      - user.created
      - user.deleted

  - name: AUTHARA_WEBHOOK_TIMEOUT
    stability: stable
    required: false
    type: duration
    default: 5s

  # ------------------------------------------------------------
  # Access Policy
  # ------------------------------------------------------------

  - name: AUTHARA_ACCESS_POLICY_ALLOWLIST_ENABLED 
    stability: stable
    required: false
    type: bool
    default: false

  # ------------------------------------------------------------
  # Challenge / Verification
  # ------------------------------------------------------------

  - name: AUTHARA_CHALLENGE_ENABLED
    stability: stable
    required: false
    type: bool
    default: false

  - name: AUTHARA_CHALLENGE_TTL
    stability: stable
    required: false
    type: duration
    default: 30m

  - name: AUTHARA_CHALLENGE_VERIFICATION_CODE_TTL
    stability: stable
    required: false
    type: duration
    default: 10m
    notes: Must be less than or equal to AUTHARA_CHALLENGE_TTL

  - name: AUTHARA_CHALLENGE_MAX_ATTEMPTS
    stability: stable
    required: false
    type: int
    default: 5

  - name: AUTHARA_CHALLENGE_MAX_RESENDS
    stability: stable
    required: false
    type: int
    default: 3

  - name: AUTHARA_CHALLENGE_MIN_RESEND_INTERVAL
    stability: stable
    required: false
    type: duration
    default: 30s

  # ------------------------------------------------------------
  # Email
  # ------------------------------------------------------------

  - name: AUTHARA_EMAIL_PROVIDER
    stability: stable
    required: false
    type: enum
    default: noop
    allowed_values:
      - noop
      - smtp

  - name: AUTHARA_EMAIL_FROM
    stability: stable
    required: false
    type: string
    notes: Required when AUTHARA_EMAIL_PROVIDER=smtp

  - name: AUTHARA_EMAIL_SMTP_HOST
    stability: stable
    required: false
    type: string
    notes: Required when AUTHARA_EMAIL_PROVIDER=smtp

  - name: AUTHARA_EMAIL_SMTP_PORT
    stability: stable
    required: false
    type: int
    default: 587

  - name: AUTHARA_EMAIL_SMTP_USERNAME
    stability: stable
    required: false
    type: string

  - name: AUTHARA_EMAIL_SMTP_PASSWORD
    stability: stable
    required: false
    type: string

  - name: AUTHARA_EMAIL_SMTP_TLS
    stability: stable
    required: false
    type: bool
    default: true

  - name: AUTHARA_EMAIL_SMTP_TIMEOUT
    stability: stable
    required: false
    type: duration
    default: 10s

  # ------------------------------------------------------------
  # Email Worker
  # ------------------------------------------------------------

  - name: AUTHARA_EMAIL_WORKER_COUNT
    stability: stable
    required: false
    type: int
    default: 2

  - name: AUTHARA_EMAIL_WORKER_POLL_INTERVAL
    stability: stable
    required: false
    type: duration
    default: 2s

  - name: AUTHARA_EMAIL_JOB_MAX_ATTEMPTS
    stability: stable
    required: false
    type: int
    default: 10

  # ------------------------------------------------------------
  # Email Cleanup
  # ------------------------------------------------------------

  - name: AUTHARA_EMAIL_CLEANUP_SENT_AFTER
    stability: stable
    required: false
    type: duration
    default: 720h
    notes: Delete sent emails after duration (30 days)

  - name: AUTHARA_EMAIL_CLEANUP_FAILED_AFTER
    stability: stable
    required: false
    type: duration
    default: 2160h
    notes: Delete failed emails after duration (90 days)
