name: CI Migrations

on:
  pull_request:
    paths:
      - "migrations/**"
  push:
    branches: [main]
    paths:
      - "migrations/**"

jobs:
  verify-migrations:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: authara
          POSTGRES_USER: authara
          POSTGRES_PASSWORD: authara
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U authara -d authara"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Wait for Postgres
        env:
          POSTGRESQL_HOST: localhost
          POSTGRESQL_PORT: 5432
          POSTGRESQL_DATABASE: authara
          POSTGRESQL_USERNAME: authara
        run: |
          until pg_isready \
            -h "$POSTGRESQL_HOST" \
            -p "$POSTGRESQL_PORT" \
            -U "$POSTGRESQL_USERNAME" \
            -d "$POSTGRESQL_DATABASE"; do
            echo "waiting for postgres..."
            sleep 2
          done

      - name: Build migration image
        run: |
          docker build \
            -f migrations/Dockerfile \
            -t authara-migrations:test \
            ./migrations

      - name: Apply migrations
        env:
          POSTGRESQL_HOST: localhost
          POSTGRESQL_PORT: 5432
          POSTGRESQL_DATABASE: authara
          POSTGRESQL_USERNAME: authara
          POSTGRESQL_PASSWORD: authara
          POSTGRESQL_SCHEMA: authara
        run: |
          docker run --rm \
            --network host \
            -e POSTGRESQL_HOST \
            -e POSTGRESQL_PORT \
            -e POSTGRESQL_DATABASE \
            -e POSTGRESQL_USERNAME \
            -e POSTGRESQL_PASSWORD \
            -e POSTGRESQL_SCHEMA \
            authara-migrations:test \
            up \
            -env=default \
            -config=/migrations/dbconfig.yaml
