name: CD Migrations

on:
  push:
    tags:
      - "migrations-v*"

permissions:
  contents: read
  packages: write

jobs:
  migrations:
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Derive migrations version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#migrations-}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build migrations image
        run: |
          docker build \
            -f migrations/Dockerfile \
            -t ghcr.io/authara-org/authara-migrations:${{ steps.version.outputs.tag }} \
            ./migrations

      - name: Push migrations image
        run: |
          docker push ghcr.io/authara-org/authara-migrations:${{ steps.version.outputs.tag }}
