name: CD Migrations

on:
  push:
    tags:
      - "migrations-v*"

permissions:
  contents: read
  packages: write

jobs:
  migrations:
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - uses: actions/checkout@v6

      - name: Derive migrations version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#migrations-}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch migrations image
        uses: docker/build-push-action@v6
        with:
          context: ./migrations
          file: migrations/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/authara-org/authara-migrations:${{ steps.version.outputs.tag }}
